<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a4d3e">
    <title>オフライン - ReadNest</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <style>
        :root {
            --color-primary: #1a4d3e;
            --color-bg: #f5f1e8;
            --color-accent: #38a182;
            --color-text: #1f2937;
            --color-muted: #6b7280;
        }
        * { box-sizing: border-box; }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo, sans-serif;
            color: var(--color-text);
            background-color: var(--color-bg);
        }
        .wrap {
            min-height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .logo {
            margin-bottom: 1.5rem;
        }
        .logo img {
            max-width: 200px;
            height: auto;
        }
        h1 {
            margin: 0 0 0.75rem;
            font-size: 1.5rem;
            color: var(--color-primary);
        }
        p {
            margin: 0 0 2rem;
            color: var(--color-muted);
            line-height: 1.7;
            max-width: 28rem;
        }
        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.7;
        }
        button {
            font: inherit;
            font-weight: 600;
            color: #fff;
            background-color: var(--color-primary);
            border: 0;
            border-radius: 9999px;
            padding: 0.75rem 2rem;
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        button:hover, button:focus {
            background-color: var(--color-accent);
            outline: none;
        }
        @media (prefers-color-scheme: dark) {
            html, body { background-color: #111827; color: #f3f4f6; }
            h1 { color: #6ee7b7; }
            p { color: #9ca3af; }
        }
    </style>
</head>
<body>
    <main class="wrap">
        <div class="icon" aria-hidden="true">📡</div>
        <div class="logo">
            <img src="/img/logo.png" alt="ReadNest" onerror="this.style.display='none'">
        </div>
        <h1>オフラインです</h1>
        <p>ネットワークに接続できませんでした。<br>接続を確認してから、もう一度お試しください。</p>
        <button type="button" onclick="location.reload()">再試行</button>
    </main>
</body>
</html>
